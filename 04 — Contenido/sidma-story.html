<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: 'Luxia Display';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Luxia-Display.otf') format('opentype');
  }
  @font-face {
    font-family: 'Montserrat';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Montserrat-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
  }
  @font-face {
    font-family: 'Montserrat';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Montserrat-Italic-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
    font-style: italic;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }

  .card {
    width: 1080px;
    height: 1920px;
    position: relative;
    background: #0C1657;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Decorative circles */
  .circle { position: absolute; border-radius: 50%; }
  .c1 { width: 680px; height: 680px; top: -220px; left: -210px; background: #00BF90; opacity: 0.09; }
  .c2 { width: 400px; height: 400px; top: -90px; right: -120px; background: #048D7F; opacity: 0.06; }
  .c3 { width: 760px; height: 760px; bottom: -280px; right: -250px; background: #00BF90; opacity: 0.09; }
  .c4 { width: 360px; height: 360px; bottom: -90px; left: -100px; background: #048D7F; opacity: 0.06; }

  /* Top accent */
  .top-line {
    width: 100%; height: 7px; flex-shrink: 0;
    background: linear-gradient(to right, #0C1657, #00BF90, #0C1657);
  }

  /* Logo */
  .logo-area {
    margin-top: 110px;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 2; flex-shrink: 0;
  }
  .logo-area img { height: 118px; width: auto; }
  .tagline {
    margin-top: 22px;
    font-family: 'Montserrat', sans-serif; font-weight: 500;
    font-size: 22px; color: #00BF90; letter-spacing: 3px; text-transform: uppercase; opacity: 0.85;
  }
  .logo-divider {
    width: 90px; height: 2px; background: #00BF90;
    margin-top: 44px; opacity: 0.45;
  }

  /* Columns */
  .content {
    margin-top: 80px;
    display: flex; flex-direction: row;
    width: 100%; padding: 0 56px;
    position: relative; z-index: 2; flex-shrink: 0;
  }
  .column {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; padding: 0 36px;
  }
  .vertical-divider {
    width: 2px; flex-shrink: 0; margin: 0 4px;
    background: linear-gradient(to bottom, transparent, #00BF90 12%, #00BF90 88%, transparent);
    opacity: 0.50;
  }

  /* Badge */
  .badge {
    background: linear-gradient(140deg, #00BF90 0%, #048D7F 100%);
    border-radius: 24px; padding: 30px 36px;
    text-align: center; width: 100%;
    box-shadow: 0 10px 44px rgba(0,191,144,0.20); flex-shrink: 0;
  }
  .badge-label {
    font-family: 'Montserrat', sans-serif; font-weight: 400;
    font-size: 22px; color: rgba(255,255,255,0.82);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px;
  }
  .badge-name {
    font-family: 'Luxia Display', 'Montserrat', sans-serif;
    font-size: 54px; color: #FFFFFF; line-height: 1.05;
  }

  .col-text { margin-top: 72px; text-align: center; padding: 0 4px; }

  .col-millennials .col-text p {
    font-family: 'Montserrat', sans-serif;
    font-style: italic; font-weight: 400;
    font-size: 30px; line-height: 1.75; color: #FFFFFF; opacity: 0.92;
  }
  .col-genz .emoji-line {
    font-size: 84px; display: block; text-align: center;
    margin-bottom: 30px; line-height: 1;
  }
  .col-genz .highlight {
    font-family: 'Luxia Display', 'Montserrat', sans-serif;
    font-size: 54px; color: #00BF90; line-height: 1.2;
  }

  /* CTA banner */
  .cta-section {
    margin-top: 100px;
    width: 100%; padding: 0 72px;
    position: relative; z-index: 2;
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .cta-rule {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,191,144,0.5), transparent);
    margin-bottom: 60px;
  }
  .cta-box {
    background: rgba(0,191,144,0.10);
    border: 1.5px solid rgba(0,191,144,0.35);
    border-radius: 28px;
    padding: 48px 60px;
    text-align: center;
    width: 100%;
  }
  .cta-label {
    font-family: 'Montserrat', sans-serif; font-weight: 400;
    font-size: 22px; color: rgba(255,255,255,0.60);
    letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 20px;
  }
  .cta-main {
    font-family: 'Luxia Display', 'Montserrat', sans-serif;
    font-size: 52px; color: #FFFFFF; line-height: 1.1; margin-bottom: 20px;
  }
  .cta-sub {
    font-family: 'Montserrat', sans-serif; font-weight: 500;
    font-size: 24px; color: #00BF90; letter-spacing: 0.5px;
  }

  /* Bottom bar */
  .bottom-area {
    padding-bottom: 80px; padding-top: 60px;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px; position: relative; z-index: 2; flex-shrink: 0;
  }
  .bottom-line { width: 90px; height: 2px; background: #00BF90; opacity: 0.35; }
  .bottom-text {
    font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 500;
    color: rgba(255,255,255,0.45); letter-spacing: 4px; text-transform: uppercase;
  }
  .instagram-handle {
    font-family: 'Montserrat', sans-serif; font-size: 24px;
    font-weight: 700; color: #00BF90; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <div class="circle c3"></div>
  <div class="circle c4"></div>

  <div class="top-line"></div>

  <div class="logo-area">
    <img src="/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/graphics/Logo white + Color.svg" alt="SIDMA">
    <div class="tagline">7ª Edición · 2026</div>
    <div class="logo-divider"></div>
  </div>

  <div class="content">
    <div class="column col-millennials">
      <div class="badge">
        <div class="badge-label">Equipo</div>
        <div class="badge-name">MILLENIAL</div>
      </div>
      <div class="col-text">
        <p>Una competencia que fortalece tus habilidades de investigación, oratoria y debate.</p>
      </div>
    </div>

    <div class="vertical-divider"></div>

    <div class="column col-genz">
      <div class="badge">
        <div class="badge-label">Equipo</div>
        <div class="badge-name">GEN Z</div>
      </div>
      <div class="col-text">
        <span class="emoji-line">💙</span>
        <p class="highlight">la mejor experiencia del mundo</p>
      </div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-section">
    <div class="cta-rule"></div>
    <div class="cta-box">
      <div class="cta-label">Inscripciones abiertas</div>
      <div class="cta-main">Sin importar tu generación,<br>el caso te espera.</div>
      <div class="cta-sub">experienciasidma.com/inscripcion</div>
    </div>
  </div>

  <div class="bottom-area">
    <div class="bottom-line"></div>
    <div class="bottom-text">SIDMA 2026</div>
    <div class="instagram-handle">@experienciasidma</div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDMA — Millennials vs Gen Z</title>
<style>
  @font-face {
    font-family: 'Luxia Display';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Luxia-Display.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Luxia Regular';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Luxia-Regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Montserrat';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Montserrat-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
  }
  @font-face {
    font-family: 'Montserrat';
    src: url('/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/fonts/Montserrat-Italic-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
    font-style: italic;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    background: #0C1657;
    font-family: 'Montserrat', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #0C1657;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Decorative circles */
  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
    background: #00BF90;
  }
  .circle-1 {
    width: 520px;
    height: 520px;
    top: -180px;
    left: -180px;
  }
  .circle-2 {
    width: 380px;
    height: 380px;
    top: -80px;
    right: -120px;
    opacity: 0.08;
    background: #048D7F;
  }
  .circle-3 {
    width: 600px;
    height: 600px;
    bottom: -240px;
    right: -200px;
    opacity: 0.10;
  }
  .circle-4 {
    width: 280px;
    height: 280px;
    bottom: -60px;
    left: -80px;
    opacity: 0.07;
    background: #048D7F;
  }

  /* Top accent line */
  .top-line {
    width: 100%;
    height: 6px;
    background: linear-gradient(to right, #0C1657, #00BF90, #0C1657);
  }

  /* Logo area */
  .logo-area {
    margin-top: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .logo-area img {
    height: 90px;
    width: auto;
  }

  /* Tagline under logo */
  .tagline {
    margin-top: 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 18px;
    color: #00BF90;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* Divider after logo */
  .logo-divider {
    width: 80px;
    height: 2px;
    background: #00BF90;
    margin-top: 32px;
    opacity: 0.5;
    position: relative;
    z-index: 2;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: row;
    width: 100%;
    position: relative;
    z-index: 2;
    margin-top: 64px;
    padding: 0 48px;
    gap: 0;
  }

  /* Columns */
  .column {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 36px;
  }

  /* Vertical divider between columns */
  .vertical-divider {
    width: 2px;
    background: linear-gradient(to bottom, transparent, #00BF90 20%, #00BF90 80%, transparent);
    position: relative;
    flex-shrink: 0;
    opacity: 0.6;
    margin: 0 4px;
  }

  /* Badge */
  .badge {
    background: linear-gradient(135deg, #00BF90 0%, #048D7F 100%);
    border-radius: 20px;
    padding: 24px 32px;
    text-align: center;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0, 191, 144, 0.25);
  }

  .badge-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .badge-name {
    font-family: 'Luxia Display', 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: #FFFFFF;
    letter-spacing: 1px;
    line-height: 1.1;
  }

  /* Column text */
  .col-text {
    margin-top: 48px;
    text-align: center;
    padding: 0 8px;
    flex: 1;
  }

  /* Millennials column — formal italic style */
  .col-millennials .col-text p {
    font-family: 'Montserrat', sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.65;
    color: #FFFFFF;
    opacity: 0.92;
  }

  /* Gen Z column — bold punchy style */
  .col-genz .emoji-line {
    font-size: 52px;
    margin-bottom: 20px;
    display: block;
    text-align: center;
  }

  .col-genz .col-text p {
    font-family: 'Montserrat', sans-serif;
    font-style: italic;
    font-weight: 400;
    font-size: 20px;
    line-height: 1.65;
    color: rgba(255, 255, 255, 0.80);
  }

  .col-genz .highlight {
    font-family: 'Luxia Display', 'Montserrat', sans-serif;
    font-style: normal;
    font-weight: 900;
    font-size: 46px;
    color: #00BF90;
    line-height: 1.2;
  }

  /* Bottom area */
  .bottom-area {
    position: relative;
    z-index: 2;
    padding-bottom: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .bottom-line {
    width: 80px;
    height: 2px;
    background: #00BF90;
    opacity: 0.4;
    margin-bottom: 4px;
  }

  .bottom-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .instagram-handle {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #00BF90;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <!-- Decorative circles -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  <div class="circle circle-3"></div>
  <div class="circle circle-4"></div>

  <!-- Top accent line -->
  <div class="top-line"></div>

  <!-- Logo -->
  <div class="logo-area">
    <img src="/Volumes/ARC Reactor/Code Projects SSD/Borrar/social-media-manager/Style/graphics/Logo white + Color.svg" alt="SIDMA Logo">
    <div class="tagline">7ª Edición · 2026</div>
  </div>

  <div class="logo-divider"></div>

  <!-- Columns -->
  <div class="content">

    <!-- Left: Millennials -->
    <div class="column col-millennials">
      <div class="badge">
        <div class="badge-label">Equipo</div>
        <div class="badge-name">MILLENIAL</div>
      </div>
      <div class="col-text">
        <p>Una competencia que fortalece tus habilidades de investigación, oratoria y debate.</p>
      </div>
    </div>

    <!-- Vertical divider -->
    <div class="vertical-divider"></div>

    <!-- Right: Gen Z -->
    <div class="column col-genz">
      <div class="badge">
        <div class="badge-label">Equipo</div>
        <div class="badge-name">GEN Z</div>
      </div>
      <div class="col-text">
        <span class="emoji-line">💙</span>
        <p class="highlight">la mejor experiencia del mundo</p>
      </div>
    </div>

  </div>

  <!-- Bottom -->
  <div class="bottom-area">
    <div class="bottom-line"></div>
    <div class="bottom-text">SIDMA Legal 2026</div>
    <div class="instagram-handle">@experienciasidma</div>
  </div>
</div>
</body>
</html>
